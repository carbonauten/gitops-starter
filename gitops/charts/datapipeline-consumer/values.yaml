replicaCount: 1

image:
  repository: ghcr.io/carbonauten/datapipeline-consumer
  tag: latest
  pullPolicy: IfNotPresent

variant: "A"  # "A" = control, "B" = experiment

kafka:
  # Base topic name; control/experiment routing is usually done by producers.
  # For clarity, you can deploy two releases with different topics, e.g.:
  # - control:    --set variant=A,kafka.topic=events.v1.control
  # - experiment: --set variant=B,kafka.topic=events.v1.experiment
  topic: "events.v1.control"
  brokers: "kafka:9092"
  consumerGroup: "datapipeline-consumer"

resources: {}

