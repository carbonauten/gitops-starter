apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "content-hub.fullname" . | trunc 63 | trimSuffix "-" }}
  labels:
    app.kubernetes.io/name: {{ include "content-hub.name" . }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "content-hub.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "content-hub.name" . }}
    spec:
      containers:
        - name: content-hub
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: ENTRA_MOCK_AUTH
              value: {{ .Values.env.entraMockAuth | quote }}
            - name: REDIRECT_URI
              value: {{ .Values.env.redirectUri | quote }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "content-hub.fullname" . }}-secrets
                  key: session-secret
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "content-hub.fullname" . }}-secrets
                  key: azure-tenant-id
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "content-hub.fullname" . }}-secrets
                  key: azure-client-id
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "content-hub.fullname" . }}-secrets
                  key: azure-client-secret
          resources: {{ toYaml .Values.resources | nindent 12 }}
