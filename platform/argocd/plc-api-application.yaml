apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plc-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/carbonauten/gitops-starter"
    path: "gitops/charts/plc-api"
    targetRevision: HEAD
    helm:
      values: |-
        image:
          repository: ghcr.io/carbonauten/siemens-plc-api
          tag: latest
        # Override PLC connection for this environment, e.g.:
        # plc:
        #   host: "192.168.1.10"
        #   rack: 0
        #   slot: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

