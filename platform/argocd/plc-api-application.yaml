apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plc-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/<org>/gitops-starter"
    path: "gitops/charts/plc-api"
    targetRevision: HEAD
    helm:
      values: |-
        image:
          repository: ghcr.io/<org>/siemens-plc-connection
          tag: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

