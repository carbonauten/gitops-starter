name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/example-service
        run: |
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ./services/example-service

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/example-service/requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q services/example-service/tests services/datapipeline/tests

      - name: Push image (push events only)
        if: github.event_name == 'push'
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/example-service
        run: |
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Create release image tag (optional)
        run: echo "Image pushed: ghcr.io/${{ github.repository_owner }}/example-service:latest"
